<!DOCTYPE html>
<html>

<head>
    <title>Game Messenger</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background-color: #0b0b0f;
            color: #d6c7a1;
            font-family: Georgia, serif;
            margin: 0;
            padding: 10px;
        }

        button {
            background-color: #2a1f1a;
            color: #d6c7a1;
            border: 1px solid #5a4632;
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            font-size: 16px;
            box-sizing: border-box;
        }

        .panel {
            border: 1px solid #5a4632;
            padding: 10px;
            margin: 10px 0;
        }

        .hidden {
            display: none;
        }

        .me {
            text-align: right;
            margin: 5px;
        }

        .them {
            text-align: left;
            margin: 5px;
        }
    </style>

</head>

<body>

<h2>Game Messenger</h2>

<!-- LOGIN -->
<div id="login" class="panel">
    <input id="nameInput" placeholder="Your name">
    <button onclick="createGame()">Create Game</button>

    <input id="roomInput" placeholder="Room code">
    <button onclick="joinGame()">Join Game</button>
</div>

<!-- LOBBY -->
<div id="lobby" class="panel hidden">

    <h3>Room: <span id="roomCode"></span></h3>

    <h4>Players</h4>
    <div id="players"></div>

    <button id="startBtn" onclick="startGame()" class="hidden">
        Start Game (Host Only)
    </button>

</div>

<!-- GAME -->
<div id="game" class="panel hidden">

    <h3>Chat</h3>

    <div id="chat"></div>

    <input id="msgInput" placeholder="Message">
    <button onclick="sendMessage()">Send</button>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>

</body>

</html>
