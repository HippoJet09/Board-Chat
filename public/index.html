<!DOCTYPE html>
<html>

<head>

    <title>Throne Messenger</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>


<!-- PAGE 1 -->

<div id="namePage" class="screen">

    <h1>BOARD GAME</h1>

    <img src="castle.png" class="castle">

    <input
        id="nameInput"
        placeholder="Enter Your Name">

    <button onclick="showRoomPage()">
        PLAY
    </button>

</div>



<!-- PAGE 2 -->

<div id="roomPage"
     class="screen hidden">

    <h1>BOARD GAME</h1>

    <button onclick="createRoom()">
        CREATE ROOM
    </button>


    <div class="divider"></div>


    <input
        id="roomInput"
        placeholder="Enter Room Code">

    <button onclick="joinRoom()">
        JOIN ROOM
    </button>

</div>



<!-- PAGE 3 -->

<div id="lobbyPage"
     class="screen hidden">


    <div id="roomCodeDisplay"></div>


    <h1>LOBBY</h1>

    <div id="players"></div>

</div>



<!-- PAGE 4 -->

<div id="chatPage"
     class="chatScreen hidden">


    <div class="chatSidebar">

        <button onclick="backToLobby()">
            ← Lobby
        </button>

        <div id="sidebarPlayers"></div>

    </div>



    <div class="chatMain">

        <div id="chatName"></div>


        <div id="chatMessages"></div>



        <div class="presetRow">

            <button onclick="sendPreset('Alliance?')">
                Alliance?
            </button>

            <button onclick="sendPreset('Peace?')">
                Peace?
            </button>

            <button onclick="sendPreset('Attack?')">
                Attack?
            </button>

        </div>



        <div class="inputRow">

            <input
                id="messageInput"
                placeholder="Type...">

            <button onclick="sendMessage()">
                SEND
            </button>

        </div>

    </div>

</div>


<script src="/socket.io/socket.io.js"></script>

<script src="client.js"></script>

</body>
</html>
